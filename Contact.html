    <section class="contact" id="contact">

        <div class="section-title">
            <h2>Contact</h2>
        </div>

        <!-- FIX: contact-wrapper sekarang membungkus socials + form, dan ditutup dengan benar -->
        <div class="contact-wrapper">

            <div class="contact-socials">
                <a href="mailto:septiyaardilla921@gmail.com"
                   class="social-icon" aria-label="Email">
                    <i class="fa-solid fa-envelope"></i>
                </a>
                <a href="https://linkedin.com/in/septiyaardilla"
                   target="_blank" rel="noopener"
                   class="social-icon social-linkedin" aria-label="LinkedIn">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
                <a href="https://instagram.com/septiyaarr"
                   target="_blank" rel="noopener"
                   class="social-icon social-instagram" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://wa.me/6285838344919"
                   target="_blank" rel="noopener"
                   class="social-icon social-whatsapp" aria-label="WhatsApp">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
            </div>

            
        <div class="section-title">
            <h2>Let's content</h2> 
        </div>

            <form id="contact-form" novalidate>
                <div class="cm-field">
                    <label for="cf-nama">Nama Lengkap</label>
                    <input id="cf-nama" name="nama" type="text"
                           placeholder="" required>
                </div>
                <div class="cm-row">
                    <div class="cm-field">
                        <label for="cf-email">Email</label>
                        <input id="cf-email" name="email" type="email"
                               placeholder="">
                    </div>
                    <div class="cm-field">
                        <label for="cf-wa">No. WhatsApp</label>
                        <input id="cf-wa" name="kontak" type="tel"
                               placeholder="">
                    </div>
                </div>
                <div class="cm-field">
                    <label for="cf-subjek">Subjek</label>
                    <input id="cf-subjek" name="subjek" type="text"
                           placeholder="">
                </div>
                <div class="cm-field">
                    <label for="cf-pesan">Pesan</label>
                    <textarea id="cf-pesan" name="pesan" rows="5"
                              placeholder="" required></textarea>
                </div>
                <button type="submit" class="cm-submit" id="cf-submit-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                    Kirim Pesan
                </button>
                <p class="cm-note">
                    <i class="fa-solid fa-circle" style="color:#25d366;font-size:8px"></i>
                    Data akan tersimpan langsung 
                </p>
            </form>

        </div>
