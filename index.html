<!DOCTYPE html>
<html lang="id">

<head>

    <!-- =========================================
         META
    ========================================== -->
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Portfolio Septiya Ardilla — Network Monitoring, Infrastructure Configuration, dan Data Processing Specialist.">

    <meta
        name="theme-color"
        content="#2563eb">

    <title>
        Septiya Ardilla — Network Engineer Portfolio
    </title>

    <!-- =========================================
         CSS
    ========================================== -->
    <link
        rel="stylesheet"
        href="template.css">

    <!-- =========================================
         GOOGLE FONT
    ========================================== -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- =========================================
         FONT AWESOME
    ========================================== -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- =========================================
         HEADER
    ========================================== -->
    <header>

        <!-- LOGO -->
        <a href="index.html" class="logo">
            Network
            <span>Monitoring & Provisioning</span>
        </a>

        <!-- MOBILE MENU BUTTON -->
        <button
            class="menu-btn"
            aria-label="Toggle Navigation"
            aria-expanded="false">

            <i class="fa-solid fa-bars"></i>

        </button>

        <!-- OVERLAY -->
        <div
            class="nav-overlay"
            id="nav-overlay"></div>

        <!-- NAVIGATION -->
        <nav aria-label="Main Navigation">

            <a href="index.html" class="active">
                Home
            </a>

            <a href="about.html">
                About
            </a>

            <a href="skill.html">
                Skills
            </a>

            <a href="project.html">
                Projects
            </a>

            <a href="contact.html">
                Contact
            </a>

        </nav>

    </header>

    <!-- =========================================
         MAIN
    ========================================== -->
    <main>

        <!-- =====================================
             HERO SECTION
        ====================================== -->
        <section class="hero" id="home">

            <!-- HERO TEXT -->
            <div class="hero-text">

                <p class="hero-badge">

                    <i class="fa-solid fa-circle-check"></i>

                    Available for Work

                </p>

                <h1>
                    Septiya Ardilla, S.T
                </h1>

                <p>
                    Specialist
                    <span class="highlight">
                        Network Monitoring
                    </span>,
                    Infrastructure Configuration
                    & Data Processing
                </p>

                <!-- BUTTONS -->
                <div class="hero-buttons">

                    <a
                        href="project.html"
                        class="btn-primary">

                        <i class="fa-solid fa-diagram-project"></i>

                        Explore Projects

                    </a>

                    <a
                        href="contact.html"
                        class="btn-secondary">

                        <i class="fa-solid fa-envelope"></i>

                        Contact Me

                    </a>

                </div>

            </div>

            <!-- HERO IMAGE -->
            <div class="hero-image">

                <!-- BACKGROUND -->
                <div class="circle-bg"></div>

                <!-- PROFILE -->
                <div class="profile-wrapper">

                    <img
                        src="Profpct.jpeg"
                        alt="Foto profil Septiya Ardilla"
                        loading="eager"
                        decoding="async">

                </div>

                <!-- FLOATING ICON -->
                <div class="floating-icon icon1">
                    <i class="fa-solid fa-wifi"></i>
                </div>

                <div class="floating-icon icon2">
                    <i class="fa-solid fa-cloud"></i>
                </div>

                <div class="floating-icon icon3">
                    <i class="fa-solid fa-server"></i>
                </div>

                <div class="floating-icon icon4">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>

            </div>

        </section>

    </main>

    <!-- =========================================
         FOOTER
    ========================================== -->
    <footer>

        <p>
            © 2026 Septiya Ardilla —
            Telecommunication Engineer Portfolio
        </p>

    </footer>

    <!-- =========================================
         JAVASCRIPT
    ========================================== -->
    <script src="template.js"></script>
    <script src="bacground.js"></script>

</body>
</html>
